_base:
  deployments:
    api:
      replicaCount: 1
      image:
        repository: your-registry/account-service
        tag: "dev-latest"
      ingress:
        host: dev-account-service.yourdomain.com
      hpa:
        enabled: false
      resources:
        requests:
          memory: "128Mi"
          cpu: "50m"
        limits:
          memory: "256Mi"
          cpu: "100m"
      env:
        SPRING_PROFILES_ACTIVE: "dev"
