apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: itp-microservices
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  generators:
    - matrix:
        generators:
          # Axis 1: auto-discover every service metadata file
          - git:
              repoURL: https://github.com/seang454/git-ops-miscro
              revision: HEAD
              files:
                - path: teams/itp/project-itp/*/app.yaml

          # Axis 2: environments
          - list:
              elements:
                # - env: dev
                #   cluster: https://34.151.80.25:6443
                - env: prod
                  cluster: https://34.151.80.25:6443

  template:
    metadata:
      # e.g: account-service-dev, gateway-server-prod
      name: '{{service}}-{{env}}'
      labels:
        app.kubernetes.io/team: itp
        app.kubernetes.io/project: project-itp
        platform.io/wave: 'wave-{{wave}}'
      annotations:
        app.kubernetes.io/team: itp
        app.kubernetes.io/project: project-itp
        argocd.argoproj.io/sync-wave: '{{wave}}'

    spec:
      project: itp-project

      source:
        repoURL: https://github.com/seang454/git-ops-miscro
        targetRevision: HEAD
        path: '{{chartPath}}'
        helm:
          valueFiles:
            - environments/{{env}}/values.yaml   # env overrides for infra chart defaults

      destination:
        server: '{{cluster}}'
        namespace: 'itp-{{service}}-{{env}}'
        # generates:
        #   itp-account-service-dev
        #   itp-account-service-prod
        #   itp-gateway-server-prod ...

      syncPolicy:
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
          - PrunePropagationPolicy=foreground
