apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: itp-root
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: default
  source:
    repoURL: https://github.com/seang454/git-ops-miscro
    targetRevision: HEAD
    path: argocd
  destination:
    server: https://34.151.80.25:6443
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
